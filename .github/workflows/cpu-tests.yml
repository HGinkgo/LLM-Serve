name: CPU tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CUDA_VISIBLE_DEVICES: ""

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.7.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install transformers==4.57.6 accelerate safetensors xxhash
          python -m pip install -e . --no-deps

      - name: Run CPU tests
        run: |
          mkdir -p test-results
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee test-results/cpu-tests.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cpu-test-results-${{ github.sha }}
          path: test-results/cpu-tests.txt
          if-no-files-found: error
